<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" role="img" aria-label="Olympic Protective Services horizontal lockup">
  <title>OPS Horizontal Lockup</title>
  <!-- Use case: nav header, email signature, business cards -->
  <defs>
    <linearGradient id="g5bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c2233"/>
      <stop offset="100%" stop-color="#0e1118"/>
    </linearGradient>
    <linearGradient id="g5gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4b445"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
  </defs>
  <!-- Shield mark on left -->
  <g transform="translate(20 20)">
    <path d="M80 5 L20 30 V95 C20 130 45 155 80 165 C115 155 140 130 140 95 V30 L80 5 Z"
          fill="url(#g5bg)" stroke="url(#g5gold)" stroke-width="3" stroke-linejoin="round"/>
    <text x="80" y="105" text-anchor="middle"
          font-family="Oswald, Arial Black, sans-serif" font-size="44" font-weight="800"
          fill="url(#g5gold)" letter-spacing="2">OPS</text>
  </g>
  <!-- Vertical divider -->
  <line x1="200" y1="40" x2="200" y2="160" stroke="url(#g5gold)" stroke-width="1.5" opacity="0.6"/>
  <!-- Wordmark -->
  <text x="220" y="90"
        font-family="Oswald, sans-serif" font-size="42" font-weight="700"
        fill="#eef0f5" letter-spacing="2">OLYMPIC</text>
  <text x="220" y="130"
        font-family="Oswald, sans-serif" font-size="26" font-weight="600"
        fill="url(#g5gold)" letter-spacing="3">PROTECTIVE SERVICES</text>
  <!-- Tagline -->
  <line x1="220" y1="145" x2="500" y2="145" stroke="url(#g5gold)" stroke-width="1" opacity="0.5"/>
  <text x="220" y="167"
        font-family="Barlow Condensed, sans-serif" font-size="14" font-weight="600"
        fill="#a8aabe" letter-spacing="3">TRUSTED · TRAINED · PROVEN — WASHINGTON STATE</text>
</svg>
